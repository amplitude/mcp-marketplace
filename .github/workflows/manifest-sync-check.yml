name: Manifest Sync Check

on:
  pull_request:
    paths:
      - '.claude-plugin/**'
      - '.cursor-plugin/**'
      - '.github/plugin/**'
      - 'plugins/*/.claude-plugin/**'
      - 'plugins/*/.cursor-plugin/**'
      - 'plugins/*/.github/**'

jobs:
  check-manifests-in-sync:
    name: Claude / Cursor / Copilot manifests in sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Verify Claude, Cursor, and Copilot manifests match
        run: |
          set -eo pipefail

          fail=0

          check_pair() {
            local a="$1"
            local b="$2"

            if [ ! -f "$a" ] && [ ! -f "$b" ]; then
              return 0
            fi

            if [ ! -f "$a" ]; then
              echo "::error file=$b::$b exists but $a does not — both must be present and in sync."
              fail=1
              return
            fi

            if [ ! -f "$b" ]; then
              echo "::error file=$a::$a exists but $b does not — both must be present and in sync."
              fail=1
              return
            fi

            # Normalize JSON (jq -S sorts keys) and compare.
            if ! diff -u <(jq -S . "$a") <(jq -S . "$b"); then
              echo "::error file=$b::$a and $b are out of sync. Update all platform manifests together."
              fail=1
            fi
          }

          # Top-level marketplace manifests: Claude vs Cursor, Claude vs Copilot.
          check_pair ".claude-plugin/marketplace.json" ".cursor-plugin/marketplace.json"
          check_pair ".claude-plugin/marketplace.json" ".github/plugin/marketplace.json"

          # Per-plugin manifests: Claude vs Cursor, Claude vs Copilot.
          for plugin_dir in plugins/*/; do
            check_pair \
              "${plugin_dir}.claude-plugin/plugin.json" \
              "${plugin_dir}.cursor-plugin/plugin.json"
            check_pair \
              "${plugin_dir}.claude-plugin/plugin.json" \
              "${plugin_dir}.github/plugin.json"
          done

          exit $fail
